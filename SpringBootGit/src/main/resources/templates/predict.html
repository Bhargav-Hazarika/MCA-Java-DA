<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prediction</title>
    <link rel="stylesheet" th:href="@{/predict.css}">
</head>

<body>

<div class="predict-header">
    <h1>Price Prediction</h1>
    <p>Enter property details</p>
</div>

<div class="predict-container">

<form method="post" th:action="@{/predict}">

    <div class="predict-grid">

        <div class="predict-group">
            <label>City</label>
            <input type="text" name="city" required>
        </div>

        <div class="predict-group">
            <label>Bedrooms</label>
            <input type="number" name="bedrooms">
        </div>

        <div class="predict-group">
            <label>Capacity</label>
            <input type="number" name="person_capacity">
        </div>

        <div class="predict-group">
            <label>Cleanliness</label>
            <input type="number" step="0.1" name="cleanliness_rating">
        </div>

        <div class="predict-group">
            <label>Guest Satisfaction</label>
            <input type="number" step="0.1" name="guest_satisfaction_overall">
        </div>

        <div class="predict-group">
            <label>Distance</label>
            <input type="number" step="0.1" name="dist">
        </div>

        <div class="predict-group">
            <label>Metro Distance</label>
            <input type="number" step="0.1" name="metro_dist">
        </div>

        <div class="predict-group">
            <label>Attraction Index</label>
            <input type="number" step="0.1" name="attr_index_norm">
        </div>

        <div class="predict-group">
            <label>Restaurant Index</label>
            <input type="number" step="0.1" name="rest_index_norm">
        </div>

        <div class="predict-group full">
            <label>Price per Person</label>
            <input type="number" step="0.1" name="price_per_person">
        </div>

    </div>

    <!-- CHECKBOXES -->
    <div class="predict-checkbox-row">
        <div class="predict-checkbox">
            Private Room
            <input type="checkbox" name="room_private">
        </div>

        <div class="predict-checkbox">
            Superhost
            <input type="checkbox" name="host_is_superhost">
        </div>

        <div class="predict-checkbox">
            Multi
            <input type="checkbox" name="multi">
        </div>

        <div class="predict-checkbox">
            Biz
            <input type="checkbox" name="biz">
        </div>

        <div class="predict-checkbox">
            Weekend
            <input type="checkbox" name="time_of_week">
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="predict-actions">
        <button type="submit" class="predict-btn">Predict</button>
        <a href="/" class="predict-back">Back</a>
    </div>

</form>

<!-- RESULT -->
<div th:if="${prediction}" class="predict-result">
    Predicted Price: € <span th:text="${prediction}"></span>
</div>

</div>

</body>
</html>
